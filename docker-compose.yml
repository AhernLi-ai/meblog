version: '3.8'

services:
  # Backend service (FastAPI) for production environment
  meblog-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: meblog-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - ENV=production
      - DATABASE_URL=postgresql://memblog:memblog@116.62.176.216:6001/memblog
      - REDIS_URL=redis://116.62.176.216:6379/0
      - ALLOWED_HOSTS=*
      - DEBUG=false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - common-network

networks:
  common-network:
    external: true