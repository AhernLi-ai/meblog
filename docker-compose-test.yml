version: '3.8'

services:
  # Backend service (FastAPI) for test environment
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: meblog-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env.test
    depends_on:
      common-postgres:
        condition: service_healthy
      common-redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - meblog-network

  # Frontend service (Next.js) for test environment
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: meblog-frontend
    restart: unless-stopped
    ports:
      - "8001:3000"
    env_file:
      - ./frontend/.env.test
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - meblog-network

networks:
  meblog-network:
    external: true