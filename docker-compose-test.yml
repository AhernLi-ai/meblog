version: '3.8'

services:
  # Backend service (FastAPI) for test environment
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: meblog-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    # Copy .env.test to .env during startup
    command: sh -c "cp /app/.env.test /app/.env && exec uvicorn app.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      common-postgres:
        condition: service_healthy
      common-redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - meblog-network
    volumes:
      - ./backend:/app

  # Frontend service (Next.js) for test environment
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: meblog-frontend
    restart: unless-stopped
    ports:
      - "8001:3000"
    # Copy .env.test to .env during startup
    command: sh -c "cp /app/.env.test /app/.env && exec bun server.js"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - meblog-network
    volumes:
      - ./frontend:/app

networks:
  meblog-network:
    external: true