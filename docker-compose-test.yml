version: '3.8'

services:
  # Backend service (FastAPI) for test environment
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: meblog-backend-test:latest
    container_name: meblog-backend-test
    restart: unless-stopped
    ports:
      - "8000:8000"
    # Copy .env.test to .env during startup
    environment:
      - PATH=/app/.venv/bin:/root/.local/bin:/usr/local/bin:/usr/local/sbin:/usr/bin:/usr/sbin:/sbin:/bin
    command: sh -c "cp /app/.env.test /app/.env && exec /app/.venv/bin/uvicorn app.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - common-network
    volumes:
      - ./backend:/app

  # Frontend service (Next.js) for test environment
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: meblog-frontend-test:latest
    container_name: meblog-frontend-test
    restart: unless-stopped
    ports:
      - "8001:3000"
    # Copy .env.test to .env during startup
    command: sh -c "cp /app/.env.test /app/.env && exec bun server.js"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - common-network
    volumes:
      - ./frontend:/app

networks:
  common-network:
    external: true