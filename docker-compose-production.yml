version: '3.8'

services:
  # PostgreSQL database for production environment
  postgres:
    image: postgres:15-alpine
    container_name: common-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: meblog
      POSTGRES_USER: meblog
      POSTGRES_PASSWORD: meblog
    ports:
      - "6001:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - meblog-network

  # Redis cache for production environment
  redis:
    image: redis:7-alpine
    container_name: common-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - meblog-network

  # Backend service (FastAPI) for production environment
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: meblog-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://meblog:meblog@postgres:5432/memblog
      - REDIS_URL=redis://redis:6379/0
      - ALLOWED_HOSTS=yourdomain.com,www.yourdomain.com
      - DEBUG=false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - meblog-network
    volumes:
      - ./backend/.env.production:/app/.env:ro

  # Frontend service (Next.js) for production environment
  frontend:
    build:
      context: ./frontend/next-frontend
      dockerfile: Dockerfile
    container_name: meblog-frontend
    restart: unless-stopped
    ports:
      - "8001:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=https://api.yourdomain.com
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - meblog-network

networks:
  meblog-network:
    driver: bridge

volumes:
  postgres_data: