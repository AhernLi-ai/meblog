version: '3.8'

services:
  # Backend service (FastAPI) for production environment
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: meblog-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://memblog:memblog@common-postgres:5432/memblog
      - REDIS_URL=redis://common-redis:6379/0
      - ALLOWED_HOSTS=116.62.176.216,localhost
      - DEBUG=false
    depends_on:
      common-postgres:
        condition: service_healthy
      common-redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - meblog-network
    volumes:
      - ./backend/.env.production:/app/.env:ro

  # Frontend service (Next.js) for production environment
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: meblog-frontend
    restart: unless-stopped
    ports:
      - "8001:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://116.62.176.216:8000/api/v1
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - meblog-network

networks:
  meblog-network:
    external: true