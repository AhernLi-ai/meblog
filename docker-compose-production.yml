version: '3.8'

services:
  # Backend service (FastAPI) for production environment
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: meblog-backend-production:latest
    container_name: meblog-backend-production
    restart: unless-stopped
    ports:
      - "8000:8000"
    # Copy .env.production to .env during startup
    command: sh -c "cp /app/.env.production /app/.env && exec uvicorn app.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - common-network
    volumes:
      - ./backend:/app

  # Frontend service (Next.js) for production environment
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: meblog-frontend-production:latest
    container_name: meblog-frontend-production
    restart: unless-stopped
    ports:
      - "8001:3000"
    # Copy .env.production to .env during startup
    command: sh -c "cp /app/.env.production /app/.env && exec bun server.js"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - common-network
    volumes:
      - ./frontend:/app

networks:
  common-network:
    external: true