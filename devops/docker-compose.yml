version: '3.8'

services:
  # Backend service (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: ../devops/backend/Dockerfile
    container_name: meblog-backend
    network_mode: host
    environment:
      - DATABASE_URL=postgresql://meblog:meblog@localhost:6001/meblog
      - REDIS_URL=redis://localhost:6379/0
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Frontend service (Next.js)
  frontend:
    build:
      context: ./frontend/next-frontend
      dockerfile: ../../devops/frontend/Dockerfile
    container_name: meblog-frontend
    ports:
      - "8001:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

